services:
  - type: web
    name: osborn-web
    runtime: python
    buildCommand: ./build.sh
    startCommand: python -m gunicorn config.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: DATABASE_URL
        fromDatabase:
          name: osborn-web-db
          property: connectionString

databases:
  - name: osborn-web-db
    plan: free
